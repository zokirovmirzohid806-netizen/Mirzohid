        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function shuffleQuestions(questions) {
            return shuffleArray(questions).map(q => {
                const optionsWithIndex = q.options.map((opt, idx) => ({
                    text: opt,
                    wasCorrect: idx === q.correctAnswer
                }));
                const shuffledOptions = shuffleArray(optionsWithIndex);
                return {
                    question: q.question,
                    options: shuffledOptions.map(o => o.text),
                    correctAnswer: shuffledOptions.findIndex(o => o.wasCorrect)
                };
            });
        }

        function formatDateTime(dateString) {
            const date = new Date(dateString);
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        async function parseDocxContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const arrayBuffer = e.target.result;
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        resolve(result.value);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        async function parsePdfContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const typedArray = new Uint8Array(e.target.result);
                        const loadingTask = pdfjsLib.getDocument(typedArray);
                        const pdf = await loadingTask.promise;
                        let fullText = '';

                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item =>
                                item.str + (item.hasEOL ? '\n' : ' ')
                            ).join('');
                            fullText += pageText + '\n';
                        }
                        resolve(fullText);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function parseQuestions(text) {
            const lines = text.split('\n').filter(line => line.trim());
            const questions = [];
            let currentQuestion = null;

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                if (/^\d+[\.\)]/.test(line) || (!currentQuestion && line.length > 10)) {
                    if (currentQuestion && currentQuestion.options.length > 0) {
                        questions.push(currentQuestion);
                    }
                    currentQuestion = {
                        question: line.replace(/^\d+[\.\)]\s*/, ''),
                        options: [],
                        correctAnswer: -1
                    };
                } else if (currentQuestion) {
                    const isCorrect = line.includes('#');
                    let cleanOption = line.replace('#', '').trim();
                    cleanOption = cleanOption.replace(/^[A-Za-z0-9]+[\.\)]\s*/, '');

                    if (cleanOption) {
                        if (isCorrect) {
                            currentQuestion.correctAnswer = currentQuestion.options.length;
                        }
                        currentQuestion.options.push(cleanOption);
                    }
                }
            });

            if (currentQuestion && currentQuestion.options.length > 0) {
                questions.push(currentQuestion);
            }

            return questions.filter(q => q.options.length >= 2 && q.correctAnswer >= 0);
        }

            try {
                let text = '';
                if (file.name.endsWith('.pdf')) {
                    text = await parsePdfContent(file);

                    text = await parseDocxContent(file);
                } else {
                    alert('Faqat PDF yoki DOCX fayllarni yuklash mumkin!');
                    return;

                const questions = parseQuestions(text);

                    return;

                state.tempUploadedQuestions = {
                    sectionName: sectionName.trim(),
                    sectionPassword: sectionPassword.trim(),

                    questionCount: parseInt(questionCount) || questions.length,
                    questions: questions

                alert(`${questions.length} ta savol yuklandi! Endi "Saqlash" tugmasini bosing.`);

            } catch (error) {

            const option4 = document.getElementById('manualOption4').value.trim();
            const correctAnswer = parseInt(document.getElementById('manualCorrectAnswer').value);

            if (!sectionName || !questionText || !sectionPassword) {
                alert('Bo\'lim nomi, parol va savol matnini kiriting!');
                return;
            }

            const options = [option1, option2, option3, option4].filter(opt => opt);
            if (options.length < 2) {
                alert('Kamida 2 ta variant bo\'lishi kerak!');
                return;
            }

            let section = state.sections.find(s => s.name === sectionName);
            if (!section) {
                section = {
                    id: Date.now(),
                    name: sectionName,
                    password: sectionPassword,
                    timeLimit: parseInt(timeLimit) || 30,
                    questionCount: parseInt(questionCount) || 10,
                    questions: []
                };
                state.sections.push(section);
            }

            section.questions.push({
                question: questionText,
                options: options,
                correctAnswer: correctAnswer
            });

            saveData();
            alert('Savol muvaffaqiyatli qo\'shildi!');

            document.getElementById('manualQuestion').value = '';
            document.getElementById('manualOption1').value = '';
            document.getElementById('manualOption2').value = '';
            document.getElementById('manualOption3').value = '';
            document.getElementById('manualOption4').value = '';

            render();
        }

            sectionId = typeof sectionId === 'string' ? parseInt(sectionId) : sectionId;
            const section = state.sections.find(s => s.id === sectionId);
            if (!section) return;

            const password = prompt(`"${section.name}" bo'limi uchun parolni kiriting:`);
            if (password === null) return;

            if (password === section.password) {
                state.userSectionPassword = sectionId;
                state.currentSection = section;
                render();
            } else {
                alert('Noto\'g\'ri parol!');
            }
        }

        function startQuiz(sectionId) {
            sectionId = typeof sectionId === 'string' ? parseInt(sectionId) : sectionId;
            const section = state.sections.find(s => s.id === sectionId);

            let allShuffled = shuffleQuestions(section.questions);
            let needed = section.questionCount ? Math.min(section.questionCount, allShuffled.length) : allShuffled.length;

            state.shuffledQuestions = allShuffled.slice(0, needed);
            state.currentSection = section;
            state.currentQuestionIndex = 0;
            state.userAnswers = new Array(state.shuffledQuestions.length).fill(null);
            state.quizResults = null;
            state.currentScreen = 'quiz';

            startTimer();
            render();
        }

        function goToQuestion(index) {
            if (index >= 0 && index < state.shuffledQuestions.length) {
                state.currentQuestionIndex = index;
                state.showingFeedback = false;
                render();
            }
        }

        function handleAnswer(optionIndex) {
            // Agar natija ko'rsatilyotgan bo'lsa, bosishni taqiqlash
            if (state.showingFeedback) return;

            // Tanlangan javobni saqlash
            state.userAnswers[state.currentQuestionIndex] = optionIndex;

            // Keyingi savolga o'tish mantiqi
            if (state.currentQuestionIndex < state.shuffledQuestions.length - 1) {
                state.currentQuestionIndex++;
                render(); // Ekranni yangilash (keyingi savolni chiqarish)
            } else {
                finishQuiz(); // Agar oxirgi savol bo'lsa, natijani ko'rsatish
            }
        }

        function finishQuiz() {
            stopTimer();
            const questions = state.shuffledQuestions;
            let correctCount = 0;

            questions.forEach((q, i) => {
                if (state.userAnswers[i] === q.correctAnswer) correctCount++;
            });

            const timeSpent = (state.currentSection.timeLimit * 60) - state.remainingTime;

            const results = {
                total: questions.length,
                correct: correctCount,
                incorrect: questions.length - correctCount,
                percentage: ((correctCount / questions.length) * 100).toFixed(1),
                timeSpent: timeSpent
            };

            state.quizResults = results;

            const stat = {
                username: state.currentUser.username,
                telegramNick: state.currentUser.telegramNick,
                section: state.currentSection.name,
                sectionId: state.currentSection.id,
                date: new Date().toISOString(),
                score: results.percentage,
                correct: correctCount,
                total: questions.length,
                timeSpent: timeSpent
            };

            state.allUsersStats.push(stat);
            saveData();
            state.currentScreen = 'results';
            render();
        }

                                    <div class="grid grid-cols-2 gap-4 mb-4">
                                        <input type="text" id="newSectionName" placeholder="Bo'lim nomi (majburiy)" class="px-4 py-3 border-2 border-purple-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500" />
                                        <input type="password" id="sectionPassword" placeholder="Bo'lim paroli (majburiy)" class="px-4 py-3 border-2 border-purple-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500" />
                                        <input type="number" id="sectionTimeLimit" placeholder="Berilgan vaqt (daqiqa)" class="px-4 py-3 border-2 border-purple-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500" />
                                        <input type="number" id="sectionQuestionCount" placeholder="Har bir talabaga nechta savol tushishi" class="px-4 py-3 border-2 border-purple-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500" />
                                    </div>
                                    <div class="flex gap-4 mb-4">
                                        <label class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-semibold cursor-pointer hover:shadow-lg transition flex items-center justify-center gap-2">
                                            <div class="w-5 h-5">${icons.upload}</div> Fayl tanlash (.pdf/.docx)
                                            <input type="file" id="fileInput" accept=".pdf,.docx" onchange="handleFileUploadWrapper(event)" class="hidden" />
                                        </label>
                                    </div>
                                    ${state.tempUploadedQuestions ? `
                                        <div class="bg-green-100 border-2 border-green-400 rounded-lg p-4 mb-4">
                                            <p class="text-green-800 font-semibold mb-2">✓ ${state.tempUploadedQuestions.questions.length} ta savol yuklandi!</p>
                                            <button onclick="saveUploadedQuestions()" class="w-full px-6 py-3 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-xl font-semibold hover:shadow-lg transition flex items-center justify-center gap-2">
                                                <div class="w-5 h-5">${icons.save}</div> Saqlash
                                            </button>
                                        </div>
                                    ` : ''}
                                    <button onclick="showManualEntryForm()" class="px-6 py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-semibold hover:shadow-lg transition flex items-center justify-center gap-2">
                                        <div class="w-5 h-5">${icons.pencil}</div> Qo'lda yozish
                                    </button>
                                </div>

                                ${state.showManualEntry ? `
                                    <div class="bg-gradient-to-r from-orange-50 to-red-50 rounded-xl p-6 mb-6 border-2 border-orange-300">
                                        <div class="flex justify-between items-center mb-4">
                                            <h2 class="text-xl font-bold text-gray-800">Savol qo'lda kiritish</h2>
                                            <button onclick="hideManualEntryForm()" class="px-4 py-2 bg-gray-600 text-white rounded-lg">Yopish</button>
                                        </div>
                                        <div class="space-y-4">
                                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <input type="text" id="manualSectionName" placeholder="Bo'lim nomi" class="px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                                <input type="password" id="manualSectionPassword" placeholder="Parol" class="px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                                <input type="number" id="manualTimeLimit" placeholder="Vaqt (daqiqa)" class="px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                                <input type="number" id="manualQuestionCount" placeholder="Savol tushish soni" class="px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                            </div>
                                            <textarea id="manualQuestion" placeholder="Savol matni" rows="3" class="w-full px-4 py-3 border-2 border-orange-300 rounded-xl"></textarea>
                                            <div class="space-y-2">
                                                <input type="text" id="manualOption1" placeholder="Variant 1" class="w-full px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                                <input type="text" id="manualOption2" placeholder="Variant 2" class="w-full px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                                <input type="text" id="manualOption3" placeholder="Variant 3 (ixtiyoriy)" class="w-full px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                                <input type="text" id="manualOption4" placeholder="Variant 4 (ixtiyoriy)" class="w-full px-4 py-3 border-2 border-orange-300 rounded-xl" />
                                            </div>
                                            <select id="manualCorrectAnswer" class="w-full px-4 py-3 border-2 border-orange-300 rounded-xl">
                                                <option value="0">Variant 1</option><option value="1">Variant 2</option><option value="2">Variant 3</option><option value="3">Variant 4</option>
                                            </select>
                                            <button onclick="saveManualQuestion()" class="w-full px-6 py-3 bg-green-600 text-white rounded-xl">Savolni saqlash</button>
                                        </div>
                                    </div>
                                ` : ''}

                                <div class="space-y-4">
                                    <h2 class="text-2xl font-bold text-gray-800">Mavjud testlar</h2>
                                    ${state.sections.map(section => `
                                        <div class="bg-gray-50 rounded-xl p-6 border border-gray-200">
                                            <div class="flex justify-between items-start mb-4">
                                                <div>
                                                    <h3 class="text-xl font-bold text-gray-800">${section.name}</h3>
                                                    <p class="text-gray-600">Umumiy baza: ${section.questions.length} ta savol | Tushadi: ${section.questionCount || section.questions.length} ta</p>
                                                    <p class="text-sm text-gray-500 mt-1">🔒 Parol: ${section.password} | ⏱ Vaqt: ${section.timeLimit} daq.</p>
                                                </div>
                                                <div class="flex gap-2">
                                                    <button onclick="changeSectionPassword('${section.id}')" class="p-2 bg-yellow-600 text-white rounded-lg" title="Parolni o'zgartirish"><div class="w-5 h-5">${icons.lock}</div></button>
                                                    <button onclick="toggleSectionEdit('${section.id}')" class="p-2 bg-blue-600 text-white rounded-lg" title="Savollarni tahrirlash"><div class="w-5 h-5">${icons.edit}</div></button>
                                                    <button onclick="deleteSection('${section.id}')" class="p-2 bg-red-600 text-white rounded-lg" title="Bo'limni o'chirish"><div class="w-5 h-5">${icons.trash}</div></button>
                                                </div>
                                            </div>

                                            <div id="section-edit-${section.id}" class="hidden mt-4 space-y-3 max-h-96 overflow-y-auto bg-white p-4 rounded-lg">
                                                ${section.questions.map((q, qIndex) => `
                                                    ${state.editingQuestion && state.editingQuestion.sectionId === section.id && state.editingQuestion.questionIndex === qIndex ? `
                                                        <div class="mb-3 p-4 bg-blue-50 border-2 border-blue-300 rounded-lg">
                                                            <textarea id="edit-question-text" rows="3" class="w-full px-3 py-2 border rounded-lg mb-2">${q.question}</textarea>
                                                            ${q.options.map((opt, oIdx) => `<textarea id="edit-option-${oIdx}" rows="1" class="w-full px-3 py-2 border rounded-lg mb-2">${opt}</textarea>`).join('')}
                                                            <select id="edit-correct-answer" class="w-full px-3 py-2 border rounded-lg mb-2">
                                                                ${q.options.map((opt, oIdx) => `<option value="${oIdx}" ${oIdx === q.correctAnswer ? 'selected' : ''}>Variant ${oIdx + 1}</option>`).join('')}
                                                            </select>
                                                            <div class="flex gap-2">
                                                                <button onclick="saveQuestion(${section.id}, ${qIndex})" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg">Saqlash</button>
                                                                <button onclick="cancelEdit()" class="flex-1 bg-gray-600 text-white px-4 py-2 rounded-lg">Bekor qilish</button>
                                                            </div>
                                                        </div>
                                                    ` : `
                                                        <div class="mb-3 text-sm bg-gray-50 p-3 rounded relative group border">
                                                            <div class="absolute top-2 right-2 flex gap-1">
                                                                <button onclick="editQuestion(${section.id}, ${qIndex})" class="p-1 bg-blue-500 text-white rounded opacity-0 group-hover:opacity-100 transition shadow-sm"><div class="w-4 h-4">${icons.edit}</div></button>
                                                                <button onclick="deleteQuestion(${section.id}, ${qIndex})" class="p-1 bg-red-500 text-white rounded opacity-0 group-hover:opacity-100 transition shadow-sm"><div class="w-4 h-4">${icons.trash}</div></button>
                                                            </div>
                                                            <p class="font-medium text-gray-800 pr-16">${qIndex + 1}. ${q.question}</p>
                                                            <ul class="mt-1 space-y-1">
                                                                ${q.options.map((opt, oIndex) => `<li class="pl-4 ${oIndex === q.correctAnswer ? 'text-green-600 font-bold' : 'text-gray-600'}">${opt} ${oIndex === q.correctAnswer ? '✓' : ''}</li>`).join('')}
                                                            </ul>
                                                        </div>
                                                    `}
                                                `).join('')}

                                                ${state.addingQuestionTo && state.addingQuestionTo.sectionId === section.id ? `
                                                    <div class="mb-3 p-4 bg-green-50 border-2 border-green-300 rounded-lg">
                                                        <textarea id="new-question-text" rows="3" class="w-full px-3 py-2 border rounded-lg mb-2" placeholder="Yangi savol"></textarea>
                                                        <textarea id="new-option-0" class="w-full px-3 py-2 border rounded-lg mb-2" placeholder="Variant 1"></textarea>
                                                        <textarea id="new-option-1" class="w-full px-3 py-2 border rounded-lg mb-2" placeholder="Variant 2"></textarea>
                                                        <textarea id="new-option-2" class="w-full px-3 py-2 border rounded-lg mb-2" placeholder="Variant 3"></textarea>
                                                        <textarea id="new-option-3" class="w-full px-3 py-2 border rounded-lg mb-2" placeholder="Variant 4"></textarea>
                                                        <select id="new-correct-answer" class="w-full px-3 py-2 border rounded-lg mb-2"><option value="0">Variant 1</option><option value="1">Variant 2</option><option value="2">Variant 3</option><option value="3">Variant 4</option></select>
                                                        <div class="flex gap-2">
                                                            <button onclick="saveNewQuestionAtBottom()" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg">Saqlash</button>
                                                            <button onclick="cancelAddQuestion()" class="flex-1 bg-gray-600 text-white px-4 py-2 rounded-lg">Bekor qilish</button>
                                                        </div>
                                                    </div>
                                                ` : `
                                                    <button onclick="showAddQuestionForm(${section.id})" class="w-full px-4 py-2 bg-green-100 text-green-700 rounded-lg border-2 border-dashed border-green-300">Savol qo'shish</button>
                                                `}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div id="adminStats" class="hidden space-y-6">
                                ${renderStatsContent(todayStats, true)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStatsContent(todayStats, isAdmin = false) {
            const relevantStats = state.currentSection && !isAdmin
                ? state.allUsersStats.filter(s => s.sectionId === state.currentSection.id)
                : state.allUsersStats;

            const userGroups = {};
            relevantStats.forEach(stat => {
                const key = `${stat.username}-${stat.telegramNick}`;
                if (!userGroups[key]) {
                    userGroups[key] = {
                        username: stat.username,
                        telegramNick: stat.telegramNick,
                        stats: [],
                        totalTests: 0,
                        avgScore: 0,
                        bestScore: 0,
                        totalCorrect: 0,
                        totalQuestions: 0
                    };
                }
                userGroups[key].stats.push(stat);
            });

            Object.values(userGroups).forEach(group => {
                group.totalTests = group.stats.length;
                group.avgScore = (group.stats.reduce((sum, s) => sum + parseFloat(s.score), 0) / group.totalTests).toFixed(1);
                group.bestScore = Math.max(...group.stats.map(s => parseFloat(s.score))).toFixed(1);
                group.totalCorrect = group.stats.reduce((sum, s) => sum + s.correct, 0);
                group.totalQuestions = group.stats.reduce((sum, s) => sum + s.total, 0);
                group.stats.sort((a, b) => new Date(b.date) - new Date(a.date));
            });

            const sortedUsers = Object.values(userGroups).sort((a, b) => {
                if (parseFloat(b.bestScore) !== parseFloat(a.bestScore)) return parseFloat(b.bestScore) - parseFloat(a.bestScore);
                return parseFloat(b.avgScore) - parseFloat(a.avgScore);
            });

            return `
                <div class="bg-white rounded-xl p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">Foydalanuvchilar reytingi</h3>
                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        ${sortedUsers.map((user, index) => {
                            const userKey = `${user.username}-${user.telegramNick}`;
                            const isExpanded = state.expandedUserStats[userKey];

                            return `
                            <div class="bg-gray-50 rounded-lg border border-gray-200">
                                <div class="p-4 cursor-pointer" onclick="toggleUserStats(\`${userKey}\`)">
                                    <div class="flex justify-between items-start">
                                        <div class="flex items-center gap-3">
                                            <div class="text-xl font-bold text-gray-500">#${index + 1}</div>
                                            <div>
                                                <p class="font-bold text-gray-800">${user.username}</p>
                                                <p class="text-sm text-gray-600">${user.telegramNick}</p>
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-xl font-bold ${parseFloat(user.bestScore) >= 70 ? 'text-green-600' : 'text-red-600'}">${user.bestScore}%</div>
                                        </div>
                                    </div>
                                </div>
                                ${isExpanded ? `
                                    <div class="border-t border-gray-200 p-4 bg-white">
                                        <h4 class="font-semibold text-gray-700 mb-3">Test tarixi:</h4>
                                        <div class="space-y-2">
                                            ${user.stats.map((stat) => `
                                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                                    <div>
                                                        <p class="font-medium text-gray-800">${stat.section}</p>
                                                        <p class="text-xs text-gray-500">${formatDateTime(stat.date)}</p>
                                                    </div>
                                                    <div class="text-right">
                                                        <p class="font-bold ${parseFloat(stat.score) >= 70 ? 'text-green-600' : 'text-red-600'}">${stat.score}%</p>
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `;
        }

        function renderStats() {
            const todayStats = state.allUsersStats.filter(stat => new Date(stat.date).toDateString() === new Date().toDateString());

            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
                    <div class="container mx-auto max-w-6xl">
                        <div class="bg-white rounded-2xl shadow-2xl p-8">
                            <div class="flex justify-between items-center mb-6">
                                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                                    <div class="p-3 bg-blue-600 rounded-lg"><div class="w-8 h-8 text-white">${icons.barChart}</div></div>
                                    ${state.currentSection ? `"${state.currentSection.name}" statistikasi` : 'Statistika'}
                                </h1>
                                <button onclick="closeStats()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition flex items-center gap-2">
                                    Yopish
                                </button>
                            </div>
                            ${renderStatsContent(todayStats, false)}
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            let html = '';
            switch(state.currentScreen) {
                case 'login': html = renderLogin(); break;
                case 'main': html = renderMainMenu(); break;
                case 'quiz': html = renderQuiz(); break;
                case 'results': html = renderResults(); break;
                case 'admin': html = renderAdmin(); break;
                case 'stats': html = renderStats(); break;
            }
            document.getElementById('app').innerHTML = html;
        }

        // Initialize Global Scope for HTML onclick events
        window.handleUserLogin = handleUserLogin;
        window.handleAdminLogin = handleAdminLogin;
        window.handleLogout = handleLogout;
        window.showStats = showStats;
        window.closeStats = closeStats;
        window.toggleAdminView = toggleAdminView;
        window.toggleSectionEdit = toggleSectionEdit;
        window.handleFileUploadWrapper = handleFileUploadWrapper;
        window.saveUploadedQuestions = saveUploadedQuestions;
        window.showManualEntryForm = showManualEntryForm;
        window.hideManualEntryForm = hideManualEntryForm;
        window.saveManualQuestion = saveManualQuestion;
        window.checkSectionPassword = checkSectionPassword;
        window.startQuiz = startQuiz;
        window.goToQuestion = goToQuestion;
        window.handleAnswer = handleAnswer;
        window.returnToMain = returnToMain;
        window.deleteQuestion = deleteQuestion;
        window.deleteSection = deleteSection;
        window.changeSectionPassword = changeSectionPassword;
        window.editQuestion = editQuestion;
        window.saveQuestion = saveQuestion;
        window.cancelEdit = cancelEdit;
        window.toggleUserStats = toggleUserStats;
        window.addNewUser = addNewUser;
        window.blockUser = blockUser;
        window.unblockUser = unblockUser;
        window.showAddQuestionForm = showAddQuestionForm;
        window.cancelAddQuestion = cancelAddQuestion;
        window.saveNewQuestionAtBottom = saveNewQuestionAtBottom;
        window.render = render;

        // Start App
        loadData();
        cleanOldStats();
        render(); // Always render main login manually now

        setInterval(cleanOldStats, 24 * 60 * 60 * 1000);
    </script>
</body>
</html>
